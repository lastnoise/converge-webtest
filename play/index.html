<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>converge</title>

<style>
html, body, #canvas {
    margin: 0;
    padding: 0;
    border: 0;
    width: 100%;
    height: 100%;
}

html.cursor-hidden,
html.cursor-hidden *,
body.cursor-hidden,
body.cursor-hidden * {
    cursor: none !important;
}

body {
    color: white;
    background-color: black;
    overflow: hidden;
    touch-action: none;
    font-family: Arial, sans-serif;
}

#canvas {
    display: block;
    width: 100%;
    height: 100%;
}

#canvas:focus {
    outline: none;
}

#entry-veil {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background-color: black;
    background-position: center center;
    background-repeat: no-repeat;
    background-size: cover;
    cursor: default;
    opacity: 1;
    pointer-events: auto;
    transition: none;
}

#entry-veil.runtime-ready {
    cursor: pointer;
    pointer-events: none;
}

#entry-veil.hidden {
    display: none;
    pointer-events: none;
}

#portrait-gate {
    position: fixed;
    inset: 0;
    z-index: 1001;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.74);
    color: rgba(242, 246, 255, 0.88);
    font-size: clamp(16px, 4vw, 22px);
    line-height: 1.35;
    letter-spacing: 0.02em;
    text-align: center;
    pointer-events: none;
}

#portrait-gate.visible {
    display: flex;
}

#status {
    display: none;
}
</style>

<link rel="icon" type="image/png" href="build/index.icon.png">
<link rel="apple-touch-icon" href="build/index.apple-touch-icon.png">

</head>

<body>

<div id="entry-veil"></div>
<div id="portrait-gate">rotate to enter</div>

<canvas id="canvas" tabindex="-1">
Your browser does not support the canvas tag.
</canvas>

<div id="status"></div>

<script src="build/index.js"></script>

<script>
const GODOT_CONFIG = {
    args: [],
    canvasResizePolicy: 2,
    ensureCrossOriginIsolationHeaders: true,
    executable: "build/index",
    experimentalVK: false,
    fileSizes: {
        "build/index.pck": 768240,
        "build/index.wasm": 52126319
    },
    focusCanvas: true,
    gdextensionLibs: []
};

const engine = new Engine(GODOT_CONFIG);

(function () {

    const canvas = document.getElementById("canvas");
    const entryVeil = document.getElementById("entry-veil");
    const portraitGate = document.getElementById("portrait-gate");

    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isDesktopFirefox = !isMobile && /Firefox\//i.test(navigator.userAgent);

    const veilImage = isMobile
        ? "mobile_fov_distort.png"
        : "desktop_fov_distort.png";

    entryVeil.style.backgroundImage = `url('${veilImage}')`;

    const visualReadySettleMs = 250;
    const firefoxFullscreenSettleMs = 250;

    let runtimeReady = false;
    let visualReady = false;
    let handoffRequested = false;
    let veilHidden = false;
    let visualReadyAt = 0;
    let revealTimer = 0;

    let desiredFullscreen = false;
    let desiredPointerLock = false;
    let desiredLandscape = false;

    let firefoxFullscreenSettleTimer = 0;

    function isPortraitViewport() {
        return window.innerHeight > window.innerWidth;
    }

    function updatePortraitGate() {

        if (isMobile && isPortraitViewport() && !veilHidden) {
            portraitGate.classList.add("visible");
        } else {
            portraitGate.classList.remove("visible");
        }
    }

    function getFullscreenTarget() {
        if (isDesktopFirefox) {
            return canvas;
        }

        return document.documentElement;
    }

    function hasFullscreenApi() {
        const target = getFullscreenTarget();
        return !!(target && target.requestFullscreen);
    }

    function hasPointerLockApi() {
        return !!canvas.requestPointerLock;
    }

    function isPointerLocked() {
        return document.pointerLockElement === canvas;
    }

    function isFullscreenActive() {
        return !!document.fullscreenElement;
    }

    function requestFullscreenIfPossible() {

        if (!desiredFullscreen || !hasFullscreenApi() || isFullscreenActive()) {
            return;
        }

        try {

            const target = getFullscreenTarget();
            const result = target.requestFullscreen();

            if (result && result.catch) {
                result.catch(() => {});
            }

        } catch (err) {
            console.warn("fullscreen request failed", err);
        }
    }

    function requestLandscapeIfPossible() {

        if (!desiredLandscape || !isMobile || !screen.orientation || !screen.orientation.lock) {
            return;
        }

        screen.orientation.lock("landscape").catch(() => {});
    }

    function requestPointerLockIfPossible() {

        if (!desiredPointerLock || isMobile || !hasPointerLockApi() || isPointerLocked()) {
            return;
        }

        try {

            const result = canvas.requestPointerLock();

            if (result && result.catch) {
                result.catch(() => {});
            }

        } catch (err) {
            console.warn("pointer lock request failed", err);
        }
    }

    function requestDesiredCapabilities() {
        requestFullscreenIfPossible();
        requestLandscapeIfPossible();
        requestPointerLockIfPossible();
    }

    function hideCursor() {
        document.documentElement.classList.add("cursor-hidden");
        document.body.classList.add("cursor-hidden");
        canvas.style.cursor = "none";
    }

    function showCursor() {
        document.documentElement.classList.remove("cursor-hidden");
        document.body.classList.remove("cursor-hidden");
        canvas.style.cursor = "default";
    }

    function clearRevealTimer() {

        if (revealTimer !== 0) {
            window.clearTimeout(revealTimer);
            revealTimer = 0;
        }
    }

    function scheduleRevealRetry(delayMs) {

        if (revealTimer === 0) {
            revealTimer = window.setTimeout(() => {
                revealTimer = 0;
                hideWebVeil();
            }, delayMs);
        }
    }

    function hideWebVeil() {

        if (!runtimeReady || !visualReady || !handoffRequested || veilHidden) {
            return;
        }

        if (isMobile && isPortraitViewport()) {
            updatePortraitGate();
            return;
        }

        if (isDesktopFirefox && desiredFullscreen && !isFullscreenActive()) {
            return;
        }

        if (isDesktopFirefox && desiredPointerLock && !isPointerLocked()) {
            return;
        }

        const elapsed = performance.now() - visualReadyAt;
        const remaining = visualReadySettleMs - elapsed;

        if (remaining > 0) {
            scheduleRevealRetry(remaining);
            return;
        }

        veilHidden = true;

        clearRevealTimer();
        hideCursor();

        portraitGate.classList.remove("visible");
        entryVeil.classList.add("hidden");

        if (entryVeil.parentNode) {
            entryVeil.remove();
        }

        if (portraitGate.parentNode) {
            portraitGate.remove();
        }

        canvas.focus({ preventScroll: true });
        requestPointerLockIfPossible();
    }

    window.convergeRuntimeVisualReady = function () {

        visualReady = true;
        visualReadyAt = performance.now();
        hideWebVeil();
    };

    function beginRuntimeHandoff(event) {

        handoffRequested = true;
        desiredFullscreen = true;
        desiredLandscape = true;
        desiredPointerLock = true;

        if (event && event.cancelable && (event.type === "touchstart" || event.type === "keydown")) {
            event.preventDefault();
        }

        if (event) {
            requestDesiredCapabilities();
        }

        updatePortraitGate();
        hideWebVeil();
    }

    engine.startGame().then(() => {

        runtimeReady = true;

        entryVeil.classList.add("runtime-ready");

        canvas.focus({ preventScroll: true });

        updatePortraitGate();
        hideWebVeil();

    }).catch((err) => {

        console.error(err);
    });

    document.addEventListener(
        "pointerdown",
        beginRuntimeHandoff,
        { capture: true }
    );

    document.addEventListener(
        "touchstart",
        beginRuntimeHandoff,
        { capture: true, passive: false }
    );

    document.addEventListener("keydown", (event) => {

        if (!handoffRequested && (
            event.code === "Enter" ||
            event.code === "Space" ||
            event.code === "NumpadEnter"
        )) {
            beginRuntimeHandoff(event);
            return;
        }

        if (handoffRequested) {
            requestDesiredCapabilities();
        }
    });

    document.addEventListener("fullscreenchange", () => {

        if (document.fullscreenElement) {
            hideCursor();

            if (isDesktopFirefox) {
                if (firefoxFullscreenSettleTimer !== 0) {
                    window.clearTimeout(firefoxFullscreenSettleTimer);
                    firefoxFullscreenSettleTimer = 0;
                }

                firefoxFullscreenSettleTimer = window.setTimeout(() => {
                    firefoxFullscreenSettleTimer = 0;
                    canvas.focus({ preventScroll: true });
                    requestPointerLockIfPossible();
                    hideWebVeil();
                }, firefoxFullscreenSettleMs);

                return;
            }

            requestPointerLockIfPossible();
        } else {
            if (veilHidden && !desiredPointerLock) {
                showCursor();
            }
        }
    });

    document.addEventListener("pointerlockchange", () => {

        if (isPointerLocked()) {
            hideCursor();
            hideWebVeil();
        } else if (desiredPointerLock && document.visibilityState === "visible") {
            hideCursor();
        }
    });

    document.addEventListener("pointerlockerror", () => {
        hideCursor();
    });

    document.addEventListener("visibilitychange", () => {

        if (document.visibilityState === "visible" && handoffRequested) {
            hideCursor();
            requestDesiredCapabilities();
        }
    });

    window.addEventListener("resize", () => {

        updatePortraitGate();
        hideWebVeil();
    });

    window.addEventListener("orientationchange", () => {

        window.setTimeout(() => {

            updatePortraitGate();
            requestLandscapeIfPossible();
            hideWebVeil();

        }, 120);
    });

    updatePortraitGate();

})();
</script>

</body>
</html>
